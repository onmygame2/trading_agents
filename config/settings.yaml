account:
  commission_rate: 0.0001
  initial_cash: 100000
  min_commission: 0
  stamp_tax: 0.001
analysis:
  bollinger_period: 20
  bollinger_std: 2
  lookback_days: 120
  macd_fast: 12
  macd_signal: 9
  macd_slow: 26
  rsi_overbought: 70
  rsi_oversold: 30
  volume_spike_threshold: 2.0
backtest:
  end_date: null
  initial_cash: 100000
  lookback_days: 120
  report_dir: reports
  start_date: '2024-01-01'
data:
  cache_dir: data
  daily_update_time: '08:30'
  source: akshare
  provider: ifind
  kline_backend: baostock
  ifind:
    base_url: https://quantapi.51ifind.com/api/v1
    token_cache: data/ifind_token.json
    realtime_indicators: open,high,low,latest,preClose,changeRatio,volume,amount
    history_indicators: open,high,low,close,volume,amount,changeRatio
    edb_north_indicators: ''
    stock_universe_search: 全部A股
  minute_cache_ttl_intraday: 300
  minute_cache_dir: data/minute_kline
  stock_pool_rebuild_source: ifind
market:
  exclude_prefixes:
  - '8'
  - '4'
  - '920'
  exclude_st: true
  include_prefixes:
  - '600'
  - '601'
  - '603'
  - '605'
  - '000'
  - '001'
  - '002'
  - '003'
  - '300'
  - '301'
  - '302'
  - '688'
  - '689'
  min_listing_days: 60
report:
  report_dir: reports
  report_time: '09:00'
  top_n: 5
strategies:
  closing_strategy:
